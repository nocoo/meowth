version: "2"
sql:
  - engine: sqlite
    schema: migrations
    queries: queries
    gen:
      go:
        package: gen
        out: gen
        sql_package: database/sql
        emit_interface: true
        emit_json_tags: false
        emit_db_tags: false
        emit_prepared_queries: false
        emit_empty_slices: true
        omit_unused_structs: true
