packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  esbuild: false
onlyBuiltDependencies:
  - '@biomejs/biome'
overrides:
  vite: "8.1.0"
  esbuild: "0.28.1"
  # GHSA-h67p-54hq-rp68 — js-yaml polluted prototype via __proto__ in
  # YAML keys before 4.2.0. We don't load untrusted YAML at runtime,
  # but openapi-typescript pulls it in via @redocly/openapi-core, and
  # G2 (`pnpm scan:osv`) refuses to ship the MEDIUM advisory.
  js-yaml: "^4.2.0"
